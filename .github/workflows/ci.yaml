name: ci-cd

# DevSecOps pipeline: lint -> test -> build -> scan (quality gate) -> publish.
# Security controls run inside the pipeline (shift-left): Dockerfile linting,
# dependency audit, image vulnerability scanning, and IaC/config scanning.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write          # push images to GHCR

jobs:
  # ---------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/${{ matrix.service }}/Dockerfile

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/${{ matrix.service }}/package-lock.json

      - name: Install (reproducible from lockfile)
        working-directory: app/${{ matrix.service }}
        run: npm ci

      - name: Dependency vulnerability audit (quality gate)
        working-directory: app/${{ matrix.service }}
        run: npm audit --omit=dev --audit-level=critical

      - name: Smoke test (syntax check)
        working-directory: app/${{ matrix.service }}
        run: node -e "require('child_process').execSync('node --check src/' + ('${{ matrix.service }}'==='worker'?'worker.js':'server.js'))"

  # ---------------------------------------------------------------------------
  build-scan-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: app/${{ matrix.service }}
          load: true
          tags: localscan/${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (QUALITY GATE — fails on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localscan/${{ matrix.service }}:scan
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Image metadata (lowercased for GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR (only after scan passes)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: app/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha

  # ---------------------------------------------------------------------------
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan (compose + Helm + Dockerfiles) — report only
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/ticketing
