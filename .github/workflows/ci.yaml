name: ci-cd

# DevSecOps pipeline: lint -> test -> build -> scan (quality gate) -> publish.
# Security controls run inside the pipeline (shift-left): Dockerfile linting,
# dependency audit, image vulnerability scanning, and IaC/config scanning.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write          # push images to GHCR
  security-events: write   # upload SARIF to the Security tab

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}   # ghcr.io/<owner>/<repo>/<service>

jobs:
  # ---------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/${{ matrix.service }}/Dockerfile

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/${{ matrix.service }}/package-lock.json

      - name: Install (reproducible from lockfile)
        working-directory: app/${{ matrix.service }}
        run: npm ci

      - name: Dependency vulnerability audit (quality gate)
        working-directory: app/${{ matrix.service }}
        # Fail the build on high/critical known-vulnerable dependencies.
        run: npm audit --omit=dev --audit-level=critical

      - name: Smoke test
        working-directory: app/${{ matrix.service }}
        run: node -e "require('child_process').execSync('node --check src/' + ('${{ matrix.service }}'==='worker'?'worker.js':'server.js'))"

  # ---------------------------------------------------------------------------
  build-scan-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          # Tagging policy: branch name, git SHA, semver on tags, and `latest` on default branch.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: app/${{ matrix.service }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (QUALITY GATE — fails on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy SARIF report (for the Security tab)
        if: always()
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Log in to GHCR
        # Only publish on pushes to main or tags — never on PRs from forks.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (only after scan passes)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: app/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha

  # ---------------------------------------------------------------------------
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan (compose + Helm + Dockerfiles)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Lint Helm chart
        uses: azure/setup-helm@v4
      - run: helm lint helm/ticketing
