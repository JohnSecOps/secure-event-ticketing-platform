# Source: ticketing/templates/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ticketing-postgres
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: ticketing
spec:
  serviceName: ticketing-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: ticketing
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ticketing
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: ticketing-1.0.0
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: ticketing
    spec:
      serviceAccountName: ticketing
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "postgres:16.4-alpine"
          imagePullPolicy: IfNotPresent
          securityContext:
            # Postgres needs to write its data dir; keep the rest hardened.
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: ticketing-config, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: ticketing-config, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: ticketing-secret, key: POSTGRES_PASSWORD } }
            # Keep PGDATA in a subdir so the mounted volume root can stay clean.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: ticketing-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "1Gi"
---
# Source: ticketing/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: "ticketing.local"
      http:
        paths:
          # API first (more specific). The API itself strips the /api prefix.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ticketing-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticketing-frontend
                port:
                  number: 3000
