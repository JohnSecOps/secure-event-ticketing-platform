---
# Source: ticketing/templates/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ticketing
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
# Workloads do not call the Kubernetes API, so no token is mounted (least privilege).
