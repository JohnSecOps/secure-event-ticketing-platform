# Source: ticketing/templates/api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-api
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: ticketing
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: ticketing
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ticketing
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: ticketing-1.0.0
        app.kubernetes.io/name: api
        app.kubernetes.io/instance: ticketing
    spec:
      serviceAccountName: ticketing
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "ghcr.io/matej-basic/devops-project-app/api:1.0.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secret
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
