apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-worker
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
    app.kubernetes.io/name: worker
    app.kubernetes.io/instance: ticketing
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
