---
# Source: ticketing/templates/config.yaml
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secret
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
type: Opaque
stringData:
  POSTGRES_PASSWORD: "ReplaceMeInProduction"
---
# Source: ticketing/templates/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-config
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
data:
  API_PORT: "8080"
  FRONTEND_PORT: "3000"
  NODE_ENV: "production"
  POSTGRES_DB: "ticketing"
  POSTGRES_HOST: "ticketing-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "ticketing_user"
  QUEUE_NAME: "ticket_orders"
  REDIS_HOST: "ticketing-redis"
  REDIS_PORT: "6379"
---
# Source: ticketing/templates/config.yaml
# Postgres bootstrap schema, mounted into the init directory of the StatefulSet.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-postgres-init
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS ticket_orders (
        id SERIAL PRIMARY KEY,
        order_id TEXT UNIQUE NOT NULL,
        event_id TEXT NOT NULL,
        customer_email TEXT NOT NULL,
        quantity INTEGER NOT NULL CHECK (quantity > 0),
        status TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_ticket_orders_created_at ON ticket_orders (created_at DESC);

