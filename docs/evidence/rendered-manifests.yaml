      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/instance: ticketing
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ticketing
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: ticketing-1.0.0
        app.kubernetes.io/name: worker
        app.kubernetes.io/instance: ticketing
    spec:
      serviceAccountName: ticketing
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: "ghcr.io/matej-basic/devops-project-app/worker:1.0.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secret
          # No HTTP port: liveness is process-based (the queue consumer must be running).
          livenessProbe:
            exec: { command: ["sh", "-c", "pgrep -f src/worker.js"] }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            limits:
              cpu: 300m
              memory: 192Mi
            requests:
              cpu: 50m
              memory: 96Mi

