# Source: ticketing/templates/networkpolicy.yaml
# Default-deny all ingress in the namespace; explicit policies below re-open only
# the required paths (least-privilege network segmentation).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ticketing-default-deny-ingress
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
# Source: ticketing/templates/networkpolicy.yaml
# Frontend: public entry point — reachable from the ingress controller / outside.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ticketing-allow-frontend
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: ticketing
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - port: 3000
---
# Source: ticketing/templates/networkpolicy.yaml
# API: reachable from the frontend pods and from the ingress controller.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ticketing-allow-api
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: ticketing
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - port: 8080
---
# Source: ticketing/templates/networkpolicy.yaml
# PostgreSQL: only the API and worker may connect.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ticketing-allow-postgres
  labels:
    app.kubernetes.io/part-of: ticketing
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ticketing-1.0.0
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: ticketing
