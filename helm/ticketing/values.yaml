# Default values for the Secure Event Ticketing Platform chart.

# Container image registry where CI publishes the scanned images.
# Images are referenced by immutable digest/tag set in CI; override at deploy time.
image:
  registry: ghcr.io
  repository: matej-basic/devops-project-app
  pullPolicy: IfNotPresent
  # Global tag applied to the three app images unless overridden per-service.
  tag: "1.0.0"

imagePullSecrets: []

# Rolling update strategy used by all stateless Deployments.
# maxUnavailable: 0 keeps full capacity during updates; maxSurge: 1 adds one new pod.
rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1

# Non-secret configuration -> rendered into a ConfigMap.
config:
  POSTGRES_DB: ticketing
  POSTGRES_USER: ticketing_user
  POSTGRES_HOST: ticketing-postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: ticketing-redis
  REDIS_PORT: "6379"
  API_PORT: "8080"
  FRONTEND_PORT: "3000"
  QUEUE_NAME: ticket_orders
  NODE_ENV: production

# Secret values -> rendered into a Secret object (never hardcoded in manifests).
# In real clusters inject these via a secrets manager / sealed-secrets / CI, not git.
secret:
  POSTGRES_PASSWORD: "ReplaceMeInProduction"

# Pod-level hardening applied to every workload.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

frontend:
  enabled: true
  name: frontend
  replicas: 2
  image:
    name: frontend
    tag: ""        # falls back to .image.tag
  service:
    port: 3000
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits:   { cpu: "250m", memory: "128Mi" }

api:
  enabled: true
  name: api
  replicas: 2
  image:
    name: api
    tag: ""
  service:
    port: 8080
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

worker:
  enabled: true
  name: worker
  replicas: 1
  image:
    name: worker
    tag: ""
  resources:
    requests: { cpu: "50m", memory: "96Mi" }
    limits:   { cpu: "300m", memory: "192Mi" }

postgres:
  enabled: true
  name: postgres
  image: "postgres:16.4-alpine"
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""   # use cluster default
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

redis:
  enabled: true
  name: redis
  image: "redis:7.4-alpine"
  service:
    port: 6379
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits:   { cpu: "250m", memory: "128Mi" }

ingress:
  enabled: true
  className: nginx
  host: ticketing.local
  # Routes: /        -> frontend
  #         /api(/|$) -> api  (path rewritten by the API itself)
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"

networkPolicy:
  enabled: true

serviceAccount:
  create: true
  name: ""   # defaults to the chart fullname
