{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ticketing.fullname" . }}-worker
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
    {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ticketing.labels" . | nindent 8 }}
        {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ticketing.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "ticketing.image" (dict "ctx" . "name" .Values.worker.image.name "tag" .Values.worker.image.tag) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "ticketing.fullname" . }}-config
            - secretRef:
                name: {{ include "ticketing.fullname" . }}-secret
          # No HTTP port: liveness is process-based (the queue consumer must be running).
          livenessProbe:
            exec: { command: ["sh", "-c", "pgrep -f src/worker.js"] }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
