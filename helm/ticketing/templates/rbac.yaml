{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ticketing.serviceAccountName" . }}
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
# Workloads do not call the Kubernetes API, so no token is mounted (least privilege).
automountServiceAccountToken: false
---
# Minimal Role: read-only access to its own ConfigMap/Secret for diagnostics.
# No write verbs, no cluster-wide scope.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ticketing.fullname" . }}-read
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ticketing.fullname" . }}-read
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ticketing.fullname" . }}-read
subjects:
  - kind: ServiceAccount
    name: {{ include "ticketing.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
