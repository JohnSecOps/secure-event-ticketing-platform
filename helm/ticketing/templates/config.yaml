apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ticketing.fullname" . }}-config
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ticketing.fullname" . }}-secret
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secret.POSTGRES_PASSWORD | quote }}
---
# Postgres bootstrap schema, mounted into the init directory of the StatefulSet.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ticketing.fullname" . }}-postgres-init
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS ticket_orders (
        id SERIAL PRIMARY KEY,
        order_id TEXT UNIQUE NOT NULL,
        event_id TEXT NOT NULL,
        customer_email TEXT NOT NULL,
        quantity INTEGER NOT NULL CHECK (quantity > 0),
        status TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_ticket_orders_created_at ON ticket_orders (created_at DESC);
