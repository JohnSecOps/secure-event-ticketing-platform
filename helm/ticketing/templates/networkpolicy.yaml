{{- if .Values.networkPolicy.enabled }}
# Default-deny all ingress in the namespace; explicit policies below re-open only
# the required paths (least-privilege network segmentation).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ticketing.fullname" . }}-default-deny-ingress
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
# Frontend: public entry point — reachable from the ingress controller / outside.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ticketing.fullname" . }}-allow-frontend
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "frontend") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - port: 3000
---
# API: reachable from the frontend pods and from the ingress controller.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ticketing.fullname" . }}-allow-api
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - port: 8080
---
# PostgreSQL: only the API and worker may connect.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ticketing.fullname" . }}-allow-postgres
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "postgres") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "api") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "worker") | nindent 14 }}
      ports:
        - port: 5432
---
# Redis: only the API and worker may connect.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ticketing.fullname" . }}-allow-redis
  labels:
    {{- include "ticketing.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "api") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "ticketing.selectorLabels" (dict "ctx" . "component" "worker") | nindent 14 }}
      ports:
        - port: 6379
{{- end }}
